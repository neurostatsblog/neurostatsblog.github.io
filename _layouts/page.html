---
layout: default
---
<div class="page-content">
  <div class="container-narrow">
    <header class="page-header">
      <h1 class="page-title">{{ page.title }}</h1>
      {% if page.subtitle %}
      <p class="page-subtitle">{{ page.subtitle }}</p>
      {% endif %}
    </header>
    <div class="page-body">
      {{ content }}
    </div>
  </div>
</div>
